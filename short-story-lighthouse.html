      <h1>燈塔的備忘錄</h1>

      <div class="about-box story-body">
        <p>燈塔裡的備忘錄總是寫得很短。</p>
        <p>「檢查玻璃。」</p>
        <p>「別忘了咖啡豆。」</p>
        <p>「如果起霧，就把燈開得更早一點。」</p>
        <p>新任守塔人把那些紙條從抽屜裡取出來，依日期排好，才發現字跡一年比一年潦草，提醒也一年比一年溫柔。</p>
        <p>最後一張紙條沒有日期，只寫著：「海會記得方向，人也是。」</p>
        <p>那天傍晚，霧來得很快。他比規定早了十分鐘點亮燈，像是替某個未曾謀面的人，把一句話好好說完。</p>
