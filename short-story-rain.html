      <h1>雨停之前</h1>

      <div class="about-box story-body">
        <p>月台上的電子鐘停在二十三點四十七分，像是誰伸手按住了夜晚的脈搏。</p>
        <p>她把手機翻過來，又翻回去。沒有新訊息，只有雨聲從鐵皮屋簷落下，一格一格地填滿沉默。</p>
        <p>「末班車應該還會來吧？」旁邊的人問。</p>
        <p>她抬頭，看見一個提著紙袋的陌生人。紙袋邊緣被雨水浸濕，露出一角寫著生日快樂的卡片。</p>
        <p>「會吧。」她說。其實她不確定。她只是忽然希望，有些東西即使晚了，也仍然會抵達。</p>
        <p>雨又大了一點。兩個人站在同一盞燈下，沒有交換姓名，卻一起等到遠方傳來車輪聲。</p>
